name: Bot Start Check

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  start-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Start bot (timeout check)
        run: |
          timeout 20s node index.js || code=$?; if [ $code -eq 124 ]; then echo "Start check OK"; exit 0; else exit $code; fi
